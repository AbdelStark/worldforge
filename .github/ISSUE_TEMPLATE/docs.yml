name: Documentation gap
description: Report unclear, stale, or missing documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Start with the docs-only starter pack:
        https://abdelstark.github.io/worldforge/task-starters/#docs-only-or-public-surface
        It lists likely files, validation commands, evidence artifacts, docs/changelog
        expectations, and review checks for documentation-only work.
  - type: input
    id: page
    attributes:
      label: Page or file
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: Gap
      description: What is confusing, stale, or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected fix
      description: Command, success signal, or explanation the docs should include.
    validations:
      required: true
